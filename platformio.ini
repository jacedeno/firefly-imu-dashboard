; Firefly Blue Ghost IMU — firmware for Arduino Nano 33 BLE (LSM9DS1, confirmed)
; 9-DOF Madgwick fusion streamed over BLE (Web Bluetooth). See PLAN.md.

[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/ArduinoBLE@^1.3.7
    arduino-libraries/Arduino_LSM9DS1@^1.1.1
